<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JSArena</title>
    <link rel="stylesheet" href="/frontend/css/global.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 40px 0;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .auth-card h2 {
            margin-bottom: 24px;
            text-align: center;
            color: var(--accent-green);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>

    <nav class="navbar" id="navbar">
        <div class="logo">
            <a href="/">JSArena</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="card auth-card">
            <h2>Create Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" id="mobileNumber" required placeholder="Enter mobile number">
                </div>
                <div class="form-group">
                    <label>Email (Optional)</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">Sign Up</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="/login.html" style="color: var(--accent-green);">Log in</a>
            </div>
        </div>
    </main>

    <script src="/frontend/js/global.js"></script>
    <script src="/frontend/js/register.js"></script>
</body>

</html>
